name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-14
    # macos-14 is Apple Silicon (M1). REQUIRED — the Swift Android SDK
    # does NOT compile on Intel (macos-13) or Linux runners.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17 (required by Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Skip toolchain
        run: brew install skiptools/skip/skip

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Cache Skip build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: skip-${{ hashFiles('**/Package.swift', '**/Package.resolved') }}
          restore-keys: skip-

      - name: Build iOS (Swift — no simulator needed)
        run: swift build

      - name: Build Android APK
        run: skip android build --configuration release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SkipNotes-android-${{ github.sha }}
          path: .build/android/**/*.apk
          retention-days: 14

  run-on-emulator:
    runs-on: macos-14
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Skip toolchain
        run: brew install skiptools/skip/skip

      - name: Install Android emulator SDK
        run: skip android sdk install

      - name: Create AVD
        run: skip android emulator create --name CI_AVD

      - name: Launch emulator in background
        run: |
          skip android emulator launch --name CI_AVD &
          # Wait for emulator to fully boot before proceeding
          adb wait-for-device
          # Additional wait for system services to stabilize
          adb shell while [[ -z $(getprop sys.boot_completed) ]]; \
            do sleep 3; done
          echo "Emulator ready"

      - name: Download APK from previous job
        uses: actions/download-artifact@v4
        with:
          name: SkipNotes-android-${{ github.sha }}
          path: apk/

      - name: Install APK on emulator
        run: |
          APK=$(find apk/ -name "*.apk" | head -1)
          echo "Installing $APK"
          adb install "$APK"

      - name: Launch app on emulator
        run: |
          adb shell am start \
            -n com.abielcode.skipnotes/.MainActivity
          # Give app time to fully render
          sleep 8

      - name: Capture screenshot as proof of run
        run: |
          adb exec-out screencap -p > screenshot-android.png
          echo "Screenshot captured"

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: android-screenshot-${{ github.sha }}
          path: screenshot-android.png
          retention-days: 14
